name: CI & Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "extensions/**"
  pull_request:
    paths:
      - "extensions/**"

permissions:
  contents: write

jobs:
  build-and-lint:
    name: Build & Lint
    runs-on: macos-latest
    strategy:
      matrix:
        extension: [open-in-app, keeping-you-awake-control]
    defaults:
      run:
        working-directory: extensions/${{ matrix.extension }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extensions/${{ matrix.extension }}/package-lock.json
      - run: npm ci
      - run: npx ray build -e dist
      - run: npx eslint src/ --max-warnings 0
      - run: npx prettier --check "src/**" "*.json"

  release:
    name: Version & Release
    needs: build-and-lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        extension: [open-in-app, keeping-you-awake-control]
    defaults:
      run:
        working-directory: extensions/${{ matrix.extension }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Get current version
        id: current
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Get last tagged version
        id: last_tag
        run: |
          PREFIX="${{ matrix.extension }}-v"
          TAG=$(git tag --sort=-v:refname | grep -E "^${PREFIX}[0-9]" | head -1 || echo "")
          if [ -z "$TAG" ]; then
            echo "version=0.0.0" >> "$GITHUB_OUTPUT"
          else
            echo "version=${TAG#$PREFIX}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if version was manually bumped
        id: check
        run: |
          if [ "${{ steps.current.outputs.version }}" != "${{ steps.last_tag.outputs.version }}" ]; then
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "version=${{ steps.current.outputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Auto-bump version from commits
        if: steps.check.outputs.bumped == 'false'
        id: auto_bump
        run: |
          LAST_TAG="${{ steps.last_tag.outputs.version }}"
          if [ "$LAST_TAG" = "0.0.0" ]; then
            RANGE="HEAD"
          else
            RANGE="${{ matrix.extension }}-v${LAST_TAG}..HEAD"
          fi

          COMMITS=$(git log $RANGE --pretty=format:"%s" -- . || true)

          if echo "$COMMITS" | grep -qiE "^feat!|BREAKING CHANGE"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE "^feat"; then
            BUMP="minor"
          else
            BUMP="patch"
          fi

          cd ${{ github.workspace }}/extensions/${{ matrix.extension }}
          NEW_VERSION=$(node -p "
            const v = require('./package.json').version.split('.');
            if ('$BUMP' === 'major') { v[0]++; v[1]=0; v[2]=0; }
            else if ('$BUMP' === 'minor') { v[1]++; v[2]=0; }
            else { v[2]++; }
            v.join('.')
          ")

          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"

      - name: Determine final version
        id: version
        run: |
          if [ "${{ steps.check.outputs.bumped }}" = "true" ]; then
            echo "version=${{ steps.check.outputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ steps.auto_bump.outputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate changelog entry
        id: changelog
        run: |
          LAST_TAG="${{ steps.last_tag.outputs.version }}"
          VERSION="${{ steps.version.outputs.version }}"
          DATE=$(date +%Y-%m-%d)

          if [ "$LAST_TAG" = "0.0.0" ]; then
            RANGE="HEAD"
          else
            RANGE="${{ matrix.extension }}-v${LAST_TAG}..HEAD"
          fi

          {
            echo "entry<<CHANGELOG_EOF"
            echo "## [$VERSION] - $DATE"
            echo ""
            git log $RANGE --pretty=format:"- %s" -- . | grep -v "^- chore" || true
            echo ""
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG.md
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if ! grep -q "\[$VERSION\]" CHANGELOG.md 2>/dev/null; then
            ENTRY="${{ steps.changelog.outputs.entry }}"
            if [ -f CHANGELOG.md ]; then
              HEADER=$(head -1 CHANGELOG.md)
              REST=$(tail -n +2 CHANGELOG.md)
              printf '%s\n\n%s\n%s\n' "$HEADER" "$ENTRY" "$REST" > CHANGELOG.md
            else
              printf '# Changelog\n\n%s\n' "$ENTRY" > CHANGELOG.md
            fi
          fi

      - name: Format generated files
        run: npx prettier --write CHANGELOG.md package.json
        continue-on-error: true

      - name: Commit version bump & changelog
        run: |
          cd ${{ github.workspace }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add extensions/${{ matrix.extension }}/package.json extensions/${{ matrix.extension }}/CHANGELOG.md
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(${{ matrix.extension }}): release v${{ steps.version.outputs.version }}"
          git pull --rebase
          git push

      - name: Tag and release
        run: |
          cd ${{ github.workspace }}
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ matrix.extension }}-v${VERSION}"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.extension }}-v${{ steps.version.outputs.version }}
          name: "${{ matrix.extension }} v${{ steps.version.outputs.version }}"
          body: |
            **Extension:** `${{ matrix.extension }}`

            ${{ steps.changelog.outputs.entry }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
